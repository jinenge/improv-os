<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>现编OS</title>
  <meta name="description" content="一台不预装任何软件的电脑。所有应用在您打开它们时实时生成。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='4' y='4' width='56' height='56' rx='13' fill='%231d1d1f'/%3E%3Ctext x='32' y='42' font-size='26' text-anchor='middle' fill='white' font-family='-apple-system,sans-serif' font-weight='600'%3EOS%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- 开机 -->
  <div id="boot">
    <div class="boot-logo"><svg viewBox="0 0 17 17" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12.9 9.05c-.02-1.93 1.58-2.86 1.65-2.9-.9-1.31-2.3-1.49-2.79-1.51-1.19-.12-2.32.7-2.92.7-.6 0-1.53-.68-2.51-.66-1.29.02-2.48.75-3.15 1.9-1.34 2.33-.34 5.78.97 7.67.64.93 1.4 1.97 2.4 1.93.96-.04 1.33-.62 2.49-.62 1.16 0 1.49.62 2.51.6 1.04-.02 1.7-.94 2.33-1.87.73-1.08 1.03-2.12 1.05-2.17-.02-.01-2.01-.77-2.03-3.07zM10.97 3.4c.53-.64.89-1.53.79-2.42-.76.03-1.69.51-2.24 1.15-.49.57-.92 1.48-.81 2.35.85.07 1.72-.43 2.26-1.08z"/></svg></div>
    <div class="boot-progress"><div class="boot-bar"></div></div>
  </div>

  <!-- 桌面 -->
  <div id="desktop" hidden>
    <!-- 壁纸大字（纯装饰，不可交互） -->
    <div id="wallpaper-mark" aria-hidden="true"><span class="wm-name">现编OS</span><span class="wm-ver">Tahoe</span></div>
    <!-- 菜单栏 -->
    <div id="menubar">
      <div class="mb-left">
        <button class="mb-item" id="mb-apple"></button>
        <button class="mb-item mb-appname">访达</button>
        <button class="mb-item" data-menu="文件">文件</button>
        <button class="mb-item" data-menu="编辑">编辑</button>
        <button class="mb-item" data-menu="显示">显示</button>
        <button class="mb-item" data-menu="前往">前往</button>
        <button class="mb-item" data-menu="窗口">窗口</button>
        <button class="mb-item" data-menu="帮助">帮助</button>
      </div>
      <div class="mb-right">
        <button class="mb-item" id="mb-sound" title="声音"></button>
        <span class="mb-item" id="mb-battery"></span>
        <span class="mb-item" id="mb-wifi"></span>
        <button class="mb-item" id="mb-spot" title="Spotlight"></button>
        <button class="mb-item" id="mb-cc" title="控制中心"></button>
        <span class="mb-item" id="mb-clock"></span>
      </div>
    </div>

    <!-- 桌面图标 -->
    <div class="desk-icon" id="desk-readme" title="自述文件">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M14 4 h26 l10 10 v46 h-36 z" fill="#fff" stroke="#C7C7CC" stroke-width="1.5"/><path d="M40 4 l10 10 h-10 z" fill="#E5E5EA" stroke="#C7C7CC" stroke-width="1.2"/><line x1="20" y1="26" x2="44" y2="26" stroke="#D1D1D6" stroke-width="2"/><line x1="20" y1="33" x2="44" y2="33" stroke="#D1D1D6" stroke-width="2"/><line x1="20" y1="40" x2="44" y2="40" stroke="#D1D1D6" stroke-width="2"/><line x1="20" y1="47" x2="36" y2="47" stroke="#D1D1D6" stroke-width="2"/></svg>
      <span>自述文件.txt</span>
    </div>

    <!-- 窗口层 -->
    <div id="windows"></div>

    <!-- Dock -->
    <div id="dock">
      <div id="dock-icons"></div>
      <div id="dock-minis"></div>
      <div class="dock-divider"></div>
      <div id="dock-trash-slot"></div>
    </div>
  </div>

  <!-- 移动端提示 -->
  <div id="mobile-note">
    <svg viewBox="0 0 17 17" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12.9 9.05c-.02-1.93 1.58-2.86 1.65-2.9-.9-1.31-2.3-1.49-2.79-1.51-1.19-.12-2.32.7-2.92.7-.6 0-1.53-.68-2.51-.66-1.29.02-2.48.75-3.15 1.9-1.34 2.33-.34 5.78.97 7.67.64.93 1.4 1.97 2.4 1.93.96-.04 1.33-.62 2.49-.62 1.16 0 1.49.62 2.51.6 1.04-.02 1.7-.94 2.33-1.87.73-1.08 1.03-2.12 1.05-2.17-.02-.01-2.01-.77-2.03-3.07zM10.97 3.4c.53-.64.89-1.53.79-2.42-.76.03-1.69.51-2.24 1.15-.49.57-.92 1.48-.81 2.35.85.07 1.72-.43 2.26-1.08z"/></svg>
    <div class="mn-title">现编OS 需要一块更大的屏幕</div>
    <div class="mn-sub">本系统按桌面体验设计。<br>请在电脑浏览器中访问，以获得完整体验。</div>
    <button onclick="this.parentElement.remove()">继续</button>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
